name: Deploy Website Proxy

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'آدرس کامل وب‌سایت (مثال: https://example.com)'
        required: true
        type: string

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download website
        run: |
          # استخراج دامنه از URL
          DOMAIN=$(echo "${{ github.event.inputs.website_url }}" | sed -E 's|https?://([^/]+).*|\1|')
          echo "📥 Downloading from domain: $DOMAIN"
          
          mkdir -p downloaded-site
          wget --recursive \
               --no-clobber \
               --page-requisites \
               --html-extension \
               --convert-links \
               --restrict-file-names=windows \
               --domains "$DOMAIN" \
               --no-parent \
               --directory-prefix=downloaded-site \
               --tries=3 \
               --timeout=30 \
               "${{ github.event.inputs.website_url }}" || echo "⚠️ Download completed with warnings"

      - name: Prepare for deployment
        run: |
          # ساخت پوشه public
          mkdir -p public
          
          # پیدا کردن پوشه اصلی دانلود شده
          SITE_DIR=$(find downloaded-site -type d -mindepth 1 -maxdepth 1 | head -n 1)
          
          if [ -d "$SITE_DIR" ] && [ "$(ls -A $SITE_DIR)" ]; then
            echo "✅ Files found, moving to public/"
            cp -r "$SITE_DIR"/* ./public/
            
            # بررسی وجود index.html
            if [ ! -f "./public/index.html" ]; then
              # جستجو در زیرپوشه‌ها
              INDEX_FILE=$(find ./public -name "index.html" -o -name "index.htm" | head -n 1)
              if [ -n "$INDEX_FILE" ]; then
                cp "$INDEX_FILE" ./public/index.html
              fi
            fi
          else
            echo "❌ No files downloaded"
            echo "<html><head><meta charset='utf-8'><title>خطا</title></head><body style='font-family:Tahoma;text-align:center;padding:50px;direction:rtl;'><h1>❌ دانلود ناموفق بود</h1><p>لطفاً آدرس سایت را بررسی کنید.</p><p>URL: ${{ github.event.inputs.website_url }}</p></body></html>" > public/index.html
          fi
          
          # نمایش فایل‌های دانلود شده
          echo "📂 Files in public/:"
          ls -lah public/ || echo "Empty"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true

      - name: Output deployment URL
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ سایت با موفقیت دیپلوی شد!"
          echo "🔗 لینک: https://${OWNER}.github.io/${REPO_NAME}/"
          echo "⏱️  منتظر بمانید تا ۲-۵ دقیقه برای انتشار"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

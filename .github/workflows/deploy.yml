name: Site Viewer - Download & Publish

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'آدرس سایتی که باید دانلود و پابلیش شود'
        required: true
        default: 'https://example.com'

jobs:
  download-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Clean previous build
        run: |
          rm -rf public
          mkdir -p public

      - name: Download site with wget
        run: |
          cd public
          wget -l1 --convert-links --adjust-extension --page-requisites --no-parent "${{ github.event.inputs.site_url }}" || true
        # توضیح:
        # --mirror           : مثل mirror کامل سایت
        # --convert-links    : تبدیل لینک‌ها به لینک‌های لوکال
        # --adjust-extension : تنظیم پسوند فایل‌ها (مثلاً .html)
        # --page-requisites  : دانلود css/js/img لازم
        # --no-parent        : بالاتر از مسیر URL رو دانلود نکن

      - name: Normalize structure (optional)
        run: |
          # اگر سایت ریشه‌اش داخل پوشه‌ای با نام دامنه است، می‌توانی اینجا جابجایش کنی
          cd public
          # مثال: اگر wget فولدری مثل "example.com" ساخته:
          # ls
          # mv example.com/* .
          # rmdir example.com
          # این قسمت را وقتی مطمئن شدی ساختار خروجی چطوره، تنظیم کن

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit & push to gh-pages
        run: |
          # برنچ gh-pages را به صورت یک worktree جدا نگه می‌داریم
          git fetch origin gh-pages || true

          # اگر gh-pages وجود ندارد، بسازش
          if git show-ref --quiet refs/heads/gh-pages; then
            echo "gh-pages branch exists"
          else
            echo "Creating gh-pages branch"
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initialize gh-pages"
            git push origin gh-pages
            git checkout -
          fi

          # استفاده از worktree برای مدیریت راحت‌تر
          rm -rf gh-pages-worktree
          git worktree add gh-pages-worktree gh-pages

          # پاک کردن محتویات قبلی gh-pages و کپی محتوای جدید
          rm -rf gh-pages-worktree/*
          cp -R public/* gh-pages-worktree/

          cd gh-pages-worktree
          touch .nojekyll   # برای جلوگیری از پردازش Jekyll
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update site from ${{ github.event.inputs.site_url }}"
            git push origin gh-pages
          fi

    # در نهایت باید GitHub Pages را روی برنچ gh-pages ست کنی:
    # Settings -> Pages -> Deploy from branch -> gh-pages / (root)
